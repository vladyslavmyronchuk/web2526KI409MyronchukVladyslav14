<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Server</title>
    <style>
        /* Темна тема та мінімалізм */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            text-align: center; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }
        h1 { 
            color: #00e676; /* Яскраво-зелений акцент */
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: inline-block;
            margin: auto;
            border: 1px solid #333;
        }
        strong { color: #00e676; }
        p { font-size: 1.1rem; }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>IoT Lab #1</h1>
        <p>Пристрій: <strong>ESP32 Mini</strong></p>
        <p>Статус: <strong>Online</strong></p>
        <p>Файлова система: <strong>LittleFS</strong></p>
        <div class="footer">Built for Embedded Systems</div>
    </div>
</body>
</html>
