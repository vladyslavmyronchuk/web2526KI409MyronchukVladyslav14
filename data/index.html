<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Miron Setup</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 10px; }
        .container { max-width: 500px; margin: 15px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .btn { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        #led-status { font-weight: bold; color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Налаштування Wi-Fi (Stage 4)</h2>
        <form action="/save" method="POST">
            <input type="text" name="ssid" placeholder="Назва мережі (SSID)" required>
            <input type="password" name="pass" placeholder="Пароль" required>
            <button type="submit" class="btn" style="background: #27ae60;">Зберегти та перезавантажити</button>
        </form>
    </div>

    <div class="container">
        <h2>Керування LED (Stage 2)</h2>
        <button class="btn" onclick="toggleLED()">ПЕРЕМКНУТИ LED</button>
        <p>Статус: <span id="led-status">OFF</span></p>
    </div>

    <div class="container">
        <h2>Сенсори (Stage 3)</h2>
        <canvas id="myChart"></canvas>
    </div>

    <script>
        function toggleLED() {
            fetch('/toggle').then(r => r.json()).then(d => {
                document.getElementById('led-status').innerText = d.status;
                document.getElementById('led-status').style.color = (d.status === "ON") ? "#2ecc71" : "#e74c3c";
            });
        }

        var ctx = document.getElementById('myChart').getContext('2d');
        var chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'GPIO 34', data: [], borderColor: '#2ecc71', tension: 0.3 }] },
            options: { animation: false }
        });

        var gateway = `ws://${window.location.hostname}/ws`;
        var websocket = new WebSocket(gateway);
        websocket.onmessage = (e) => {
            var now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(e.data);
            if (chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update();
        };
    </script>
</body>
</html>
