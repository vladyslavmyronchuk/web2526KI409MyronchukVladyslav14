<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Core</title>
    <style>
        :root {
            --secure-green: #00ff41;
            --warn-red: #ff003c;
            --terminal-bg: #0a0a0a;
        }

        body {
            background-color: var(--terminal-bg);
            color: var(--secure-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Ефект старого монітора */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        .terminal {
            width: 90%;
            max-width: 500px;
            border: 2px solid var(--secure-green);
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            background: rgba(0, 0, 0, 0.9);
            position: relative;
        }

        .header {
            border-bottom: 2px solid var(--secure-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .status-container {
            margin: 20px 0;
            padding: 15px;
            border: 1px dashed var(--secure-green);
        }

        .led-status {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .led-status span {
            padding: 2px 10px;
            border-radius: 4px;
        }

        .active { background: var(--secure-green); color: black; box-shadow: 0 0 15px var(--secure-green); }
        .inactive { background: #333; color: #666; }

        .btn-zone {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            background: transparent;
            border: 1px solid var(--secure-green);
            color: var(--secure-green);
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: var(--secure-green);
            color: black;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 255, 65, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 255, 65, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            to { bottom: -100px; }
        }

        .console {
            font-size: 0.8rem;
            height: 60px;
            overflow: hidden;
            opacity: 0.7;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="terminal">
    <div class="scanline"></div>
    <div class="header">
        <span>[ SECURE LINK: SSL/TLS ]</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="status-container">
        <div class="led-status">SYSTEM STATE: <span id="state-text" class="inactive">OFFLINE</span></div>
        <div>ENCRYPTION: mbedTLS AES-256</div>
        <div>AUTH: BASIC_HASH_VERIFIED</div>
    </div>

    <div class="btn-zone">
        <button onclick="control('on')">[ INITIALIZE ]</button>
        <button onclick="control('off')">[ TERMINATE ]</button>
    </div>

    <div class="console" id="console">
        > Waiting for input...<br>
        > SSL Handshake successful...<br>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
    }
    setInterval(updateClock, 1000);

    function log(msg) {
        const con = document.getElementById('console');
        con.innerHTML = "> " + msg + "<br>" + con.innerHTML;
    }

    async function updateStatus() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            const el = document.getElementById('state-text');
            if (data.led_on) {
                el.innerText = "ACTIVE";
                el.className = "active";
            } else {
                el.innerText = "STANDBY";
                el.className = "inactive";
            }
        } catch (e) { log("Connection error..."); }
    }

    async function control(cmd) {
        log("Sending command: " + cmd.toUpperCase());
        await fetch('/api/control', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({command: cmd})
        });
        updateStatus();
    }

    setInterval(updateStatus, 3000);
    updateStatus();
</script>

</body>
</html>
